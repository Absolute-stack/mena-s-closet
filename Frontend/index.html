<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title -->
    <title>
      Mena's Closet Ghana | Shop Women's & Men's Fashion Online | Fast Delivery
    </title>
    <!-- Primary Meta Tags -->
    <meta
      name="title"
      content="Mena's Closet Ghana | Shop Women's & Men's Fashion Online | Fast Delivery"
    />
    <meta
      name="description"
      content="Shop quality fashion at Mena's Closet Ghana. Women's & men's clothing, accessories, traditional wear. Pay with Mobile Money or Cash on Delivery. Same-day delivery in Accra. Easy 7-day returns. Order now!"
    />
    <!-- favicon -->
    <link
      rel="shortcut icon"
      href="./src/assets/images/logo.webp"
      type="image/x-icon"
    />

    <!-- Preload  -->
    <link rel="Preload" href="/hero.avif" as="image" type="image/avif" />
    <link
      rel="dns-prefetch"
      href="https://checkout.paystack.com/popup"
      crossorigin
    />
    <link
      rel="preconnect"
      href="https://checkout.paystack.com/popup"
      crossorigin
    />
    <!-- Critical Css Styles -->
    <style>
      /* inter-regular - latin */
      @font-face {
        font-display: swap; /* Check https://developer.mozilla.org/en-US/docs/Web/CSS/@font-face/font-display for other options. */
        font-family: 'Inter';
        font-style: normal;
        font-weight: 400;
        src: url('./src/assets/fonts/inter-v20-latin-regular.woff2')
          format('woff2'); /* Chrome 36+, Opera 23+, Firefox 39+, Safari 12+, iOS 10+ */
      }

      /* inter-500 - latin */
      @font-face {
        font-display: swap; /* Check https://developer.mozilla.org/en-US/docs/Web/CSS/@font-face/font-display for other options. */
        font-family: 'Inter';
        font-style: normal;
        font-weight: 500;
        src: url('./src/assets/fonts/inter-v20-latin-500.woff2') format('woff2'); /* Chrome 36+, Opera 23+, Firefox 39+, Safari 12+, iOS 10+ */
      }

      /* inter-700 - latin */
      @font-face {
        font-display: swap; /* Check https://developer.mozilla.org/en-US/docs/Web/CSS/@font-face/font-display for other options. */
        font-family: 'Inter';
        font-style: normal;
        font-weight: 700;
        src: url('./src/assets/fonts/inter-v20-latin-700.woff2') format('woff2'); /* Chrome 36+, Opera 23+, Firefox 39+, Safari 12+, iOS 10+ */
      }

      :root {
        --main-clr: #d4744e;
        --sec-clr: #ffffff;
        --accent-clr: lightgrey;
        --tag-clr: rgba(255, 255, 105, 0.489);
        --tag-clr2: rgba(255, 255, 105);

        --bg-clr: rgb(234, 234, 234);
        --main-ff: 'Inter', sans-serif;
      }

      *,
      *::after,
      *::before {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .hero {
        margin-block-start: 2rem;
      }

      .nav {
        padding-block: 0.8rem;
        width: 1535px;
        border-block-end: 1px solid lightgray;
        background-color: var(--sec-clr);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
